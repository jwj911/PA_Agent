name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify install
        run: python -c "import pa_agent; print('OK')"

      - name: Run targeted unit tests
        run: >
          python -m pytest
          tests/unit/test_data_source_forming_bar.py
          tests/unit/test_bar_close_wait.py
          tests/unit/test_snapshot_closed_only_buffer.py
          tests/unit/test_build_analysis_frame.py
          tests/unit/test_snapshot_indicator_warmup.py
          tests/unit/test_overlay_lines.py
          tests/unit/test_support_resistance_chart.py
          tests/unit/test_chart_decision_overlay.py
          tests/unit/test_data_source_factory.py
          tests/unit/test_refresh_loop_warmup.py
          tests/unit/test_akshare_source.py
          tests/unit/test_tushare_source.py
          tests/unit/test_tradingview_socket.py
          tests/unit/test_tradingview_errors.py
          tests/unit/test_tradingview_connectivity.py
          tests/unit/test_tv_symbol_lookup.py
          tests/unit/test_market_defaults.py
          tests/unit/test_mt5_clock_skew.py
          tests/unit/test_mt5_symbol_available.py
          tests/unit/test_order_method_router.py
          tests/unit/test_trend_context.py
          tests/unit/test_decision_tree.py
          tests/unit/test_decision_continuity.py
          tests/unit/test_decision_nodes_orchestrator.py
          tests/unit/test_provider_sync_service.py
          tests/unit/test_qclaw_auto_fallback.py
          tests/unit/test_qclaw_agent_route.py
          tests/unit/test_cursor_agent_route.py
          tests/unit/test_provider_override_by_model.py
          tests/unit/test_api_key_configured.py
          tests/unit/test_pushplus_notifier.py
          tests/unit/test_secret_store.py
          tests/unit/test_settings_round_trip.py
          tests/unit/test_pending_writer_sanitize.py
          tests/unit/test_pending_writer_no_plaintext_key.py
          tests/unit/test_datetime_ts.py
          tests/unit/test_kline_bar_normalize.py
          tests/unit/test_atr_true_range.py
          tests/unit/test_kline_candle_direction.py
          tests/unit/test_kline_features.py
          tests/unit/test_order_opportunity.py
          tests/unit/test_market_features.py
          tests/unit/test_price_tick.py
          tests/unit/test_structure_levels.py
          tests/unit/test_pattern_routing.py
          tests/unit/test_stage1_normalizer.py
          tests/unit/test_stage1_normalizer_strategy_aliases.py
          tests/unit/test_decision_stance.py
          tests/unit/test_cycle_enums.py
          tests/unit/test_response_extract.py
          tests/unit/test_trace_semantic_checks.py
          tests/unit/test_coherence_checks.py
          tests/unit/test_json_validator.py
          tests/unit/test_validation_lenient_fixes.py
          tests/unit/test_mimo_compat.py
          tests/unit/test_kv_prefix_cache.py
          tests/unit/test_prompt_txt_files.py
          tests/unit/test_client_factory.py
          tests/unit/test_cost_and_ledger.py
          tests/unit/test_trade_metrics.py
          tests/unit/test_limit_order_k1_freshness.py
          tests/unit/test_provider_errors.py
          tests/unit/test_validation_retry.py
          tests/unit/test_analysis_history.py
          tests/unit/test_demo_record_loader.py
          tests/unit/test_demo_replayer.py
          --tb=line
          -q
          -p pytest_cov
          --cov=pa_agent
          --cov-report=term-missing:skip-covered

      - name: Run focused Ruff checks
        run: >
          python -m ruff check
          pa_agent/data/base.py
          pa_agent/data/snapshot.py
          pa_agent/data/mt5.py
          pa_agent/data/yfinance_source.py
          pa_agent/data/datetime_ts.py
